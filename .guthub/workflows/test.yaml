name: "Testing of github workflow CI opportunities."

on: [ push ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          - uses: actions/setup-java@v5
            with:
              distribution: 'eclipse'
              java-version: '17'
      - run: ./gradlew clean test
      - run: bats -v